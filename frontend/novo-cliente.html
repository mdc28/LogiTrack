<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Novo Cliente - LogiTrack</title>

    <link rel="stylesheet" href="CSS/style.css">

</head>


<body>


<header>

    <h1>LogiTrack</h1>
    <p>Sistema de Gestão de Transporte</p>

</header>


<nav>

    <ul>

        <li><a href="painel-controle.html">Painel de Controle</a></li>
        <li><a href="clientes.html" class="ativo-menu">Clientes</a></li>
        <li><a href="veiculos.html">Veículos</a></li>
        <li><a href="fretes.html">Fretes</a></li>
        <li><a href="entregas.html">Entregas</a></li>

    </ul>

</nav>



<main>


<div class="cabecalho-pagina">

    <div>

        <h2>Novo Cliente</h2>

        <p>
            Cadastro de cliente no sistema
        </p>

    </div>

</div>



<section class="formulario">


<form id="form-cliente">


<label>
Nome:
</label>

<input 
type="text"
id="nome"
placeholder="Ex: Transportadora ABC"
required>



<label>
Documento:
</label>

<input
type="text"
id="documento"
placeholder="Ex: CNPJ ou CPF">



<label>
Telefone:
</label>

<input
type="text"
id="telefone"
placeholder="Ex: (11) 99999-9999">



<label>
E-mail:
</label>

<input
type="email"
id="email"
placeholder="Ex: contato@empresa.com">



<label>
Cidade:
</label>

<input
type="text"
id="cidade"
placeholder="Ex: São Paulo">



<label>
Status:
</label>

<select id="status">

<option value="Ativo">
Ativo
</option>

<option value="Inativo">
Inativo
</option>

</select>



<button type="submit" class="botao-principal">

Salvar Cliente

</button>



</form>


</section>


</main>





<script>


const formulario = document.getElementById("form-cliente");



formulario.addEventListener("submit", function(event){


event.preventDefault();



const cliente = {


    nome: document.getElementById("nome").value,

    documento: document.getElementById("documento").value,

    telefone: document.getElementById("telefone").value,

    email: document.getElementById("email").value,

    cidade: document.getElementById("cidade").value,

    status: document.getElementById("status").value


};



fetch("http://localhost:3000/clientes", {


    method: "POST",


    headers: {

        "Content-Type": "application/json"

    },


    body: JSON.stringify(cliente)



})



.then(resposta => resposta.json())



.then(resultado => {


    alert(resultado.mensagem);


    window.location.href = "clientes.html";


})



.catch(erro => {


    console.log("Erro:", erro);


    alert("Erro ao cadastrar cliente");


});



});



</script>


</body>

</html>
