<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LogiTrack - Sistema de Transporte</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>LogiTrack</h1>
        <p>Sistema de Gestão de Transporte</p>
    </header>


    <nav>
        <ul>
            <li>Dashboard</li>
            <li>Clientes</li>
            <li>Veículos</li>
            <li>Fretes</li>
            <li>Entregas</li>
        </ul>
    </nav>


    <main>

        <h2>Dashboard</h2>

        <section class="cards">

            <div class="card">
                <h3>Veículos</h3>
                <p>5 cadastrados</p>
            </div>


            <div class="card">
                <h3>Clientes</h3>
                <p>12 cadastrados</p>
            </div>


            <div class="card">
                <h3>Fretes</h3>
                <p>25 em andamento</p>
            </div>


            <div class="card">
                <h3>Entregas</h3>
                <p>18 concluídas</p>
            </div>

        </section>

    </main>


</body>

</html>
